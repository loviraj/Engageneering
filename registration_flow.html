<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Registration Flow — Engageneering™</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060c1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1.5rem;font-family:'EB Garamond',Georgia,serif}
.page-title{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:5px;color:#c8922a;text-transform:uppercase;margin-bottom:.4rem;text-align:center}
.page-sub{font-size:9px;letter-spacing:2px;color:#4a6a8a;text-transform:uppercase;margin-bottom:2rem;text-align:center}
.diagram-wrap{width:100%;max-width:900px;background:#0b1624;border:1px solid #1e3a6a;border-radius:14px;padding:2rem}
svg text{font-family:'EB Garamond',Georgia,serif}
.footer{font-size:8.5px;letter-spacing:2px;color:#2a4060;text-transform:uppercase;margin-top:1.8rem;text-align:center}
</style>
</head>
<body>

<div class="page-title">Engageneering™ — Data Architecture</div>
<div class="page-sub">Registration &amp; identity flow · From landing page to active profile</div>

<div class="diagram-wrap">
<svg width="100%" viewBox="0 0 680 640" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Engageneering™ registration and identity flow</title>
<desc>Data flow from landing page through auth method selection, identity verification, account creation, and profile initialisation</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.th{font-family:'EB Garamond',Georgia,serif;font-size:14px;font-weight:500;fill:#e8f0fc}
.ts{font-family:'EB Garamond',Georgia,serif;font-size:12px;font-weight:400;fill:#7a9ab8}

.c-gray rect{fill:#1a2a40;stroke:#3a5070}
.c-gray .th{fill:#b8cce8}.c-gray .ts{fill:#5a7a9a}

.c-blue rect{fill:#0c2040;stroke:#2a5a9a}
.c-blue .th{fill:#85b7eb}.c-blue .ts{fill:#4a7aaa}

.c-teal rect{fill:#062018;stroke:#1a5a40}
.c-teal .th{fill:#5dcaa5}.c-teal .ts{fill:#2a7a5a}

.c-amber rect{fill:#201408;stroke:#6a4a10}
.c-amber .th{fill:#f0c040}.c-amber .ts{fill:#9a7a20}

.c-purple rect{fill:#140820;stroke:#4a2a8a}
.c-purple .th{fill:#afa9ec}.c-purple .ts{fill:#6a5aaa}

.c-red rect{fill:#200810;stroke:#6a1a2a}
.c-red .th{fill:#f09595}.c-red .ts{fill:#9a3a4a}

.arr{stroke:#2a4a7a;stroke-width:1.2;fill:none}
.node{cursor:pointer}.node:hover rect{opacity:.85}
</style>
</defs>

<!-- PHASE LABELS -->
<text class="ts" x="50"  y="28" text-anchor="middle">Entry</text>
<text class="ts" x="200" y="28" text-anchor="middle">Auth method</text>
<text class="ts" x="390" y="28" text-anchor="middle">Identity verification</text>
<text class="ts" x="578" y="28" text-anchor="middle">Account creation</text>

<!-- Phase dividers -->
<line x1="122" y1="14" x2="122" y2="630" stroke="#1e3a6a" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="302" y1="14" x2="302" y2="630" stroke="#1e3a6a" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="492" y1="14" x2="492" y2="630" stroke="#1e3a6a" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- LANDING -->
<g class="node c-gray">
  <rect x="20" y="48" width="110" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="75" y="70" text-anchor="middle" dominant-baseline="central">Landing page</text>
</g>
<line x1="130" y1="70" x2="150" y2="70" class="arr" marker-end="url(#arrow)" stroke="#3a5070"/>

<!-- AUTH METHOD -->
<g class="node c-blue">
  <rect x="150" y="48" width="110" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="205" y="59" text-anchor="middle" dominant-baseline="central">Auth method</text>
  <text class="ts" x="205" y="77" text-anchor="middle" dominant-baseline="central">choice</text>
</g>

<!-- 4 auth paths -->
<line x1="260" y1="58" x2="318" y2="58" class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<g class="node c-blue">
  <rect x="318" y="40" width="96" height="36" rx="4" stroke-width="0.5"/>
  <text class="th" x="366" y="58" text-anchor="middle" dominant-baseline="central">Google OAuth</text>
</g>

<line x1="260" y1="67" x2="280" y2="110" class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<g class="node c-blue">
  <rect x="318" y="92" width="96" height="36" rx="4" stroke-width="0.5"/>
  <text class="th" x="366" y="110" text-anchor="middle" dominant-baseline="central">LinkedIn OAuth</text>
</g>

<line x1="260" y1="76" x2="280" y2="160" class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<g class="node c-blue">
  <rect x="318" y="142" width="96" height="36" rx="4" stroke-width="0.5"/>
  <text class="th" x="366" y="160" text-anchor="middle" dominant-baseline="central">Magic link</text>
</g>

<line x1="260" y1="82" x2="280" y2="210" class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<g class="node c-blue">
  <rect x="318" y="192" width="96" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="366" y="207" text-anchor="middle" dominant-baseline="central">Email + password</text>
  <text class="ts" x="366" y="225" text-anchor="middle" dominant-baseline="central">validation</text>
</g>

<!-- Converge to identity record -->
<line x1="414" y1="58"  x2="510" y2="92"  class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<line x1="414" y1="110" x2="510" y2="102" class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<line x1="414" y1="160" x2="510" y2="112" class="arr" marker-end="url(#arrow)" stroke="#378add"/>
<line x1="414" y1="214" x2="510" y2="122" class="arr" marker-end="url(#arrow)" stroke="#378add"/>

<!-- IDENTITY RECORD -->
<g class="node c-teal">
  <rect x="510" y="66" width="148" height="68" rx="4" stroke-width="0.5"/>
  <text class="th" x="584" y="86"  text-anchor="middle" dominant-baseline="central">Identity record</text>
  <text class="ts" x="584" y="104" text-anchor="middle" dominant-baseline="central">uid · email · provider</text>
  <text class="ts" x="584" y="120" text-anchor="middle" dominant-baseline="central">created_at · verified</text>
</g>

<!-- Duplicate check -->
<text class="ts" x="448" y="88" text-anchor="middle">existing?</text>
<path d="M510 92 L448 92 L448 278 L436 278" fill="none" stroke="#e24b4a" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<g class="node c-red">
  <rect x="318" y="258" width="118" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="377" y="273" text-anchor="middle" dominant-baseline="central">Duplicate email</text>
  <text class="ts" x="377" y="291" text-anchor="middle" dominant-baseline="central">redirect to login</text>
</g>

<!-- Profile record -->
<line x1="584" y1="134" x2="584" y2="162" class="arr" marker-end="url(#arrow)" stroke="#1d9e75"/>
<g class="node c-teal">
  <rect x="510" y="162" width="148" height="100" rx="4" stroke-width="0.5"/>
  <text class="th" x="584" y="182" text-anchor="middle" dominant-baseline="central">User profile record</text>
  <text class="ts" x="584" y="200" text-anchor="middle" dominant-baseline="central">display_name · avatar</text>
  <text class="ts" x="584" y="216" text-anchor="middle" dominant-baseline="central">role[] · expertise_tags[]</text>
  <text class="ts" x="584" y="232" text-anchor="middle" dominant-baseline="central">joined_at · status: active</text>
  <text class="ts" x="584" y="248" text-anchor="middle" dominant-baseline="central">seeker_tier · answerer_tier</text>
</g>

<!-- Email verification branch -->
<g class="node c-amber">
  <rect x="148" y="338" width="142" height="44" rx="4" stroke-width="0.5"/>
  <text class="th" x="219" y="353" text-anchor="middle" dominant-baseline="central">Email verification</text>
  <text class="ts" x="219" y="371" text-anchor="middle" dominant-baseline="central">token · 24hr expiry</text>
</g>
<path d="M366 236 L366 360 L290 360" fill="none" stroke="#ba7517" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<path d="M290 348 L302 328 L584 328 L584 262" fill="none" stroke="#ba7517" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- ARIA init -->
<line x1="584" y1="262" x2="584" y2="304" class="arr" marker-end="url(#arrow)" stroke="#1d9e75"/>
<g class="node c-amber">
  <rect x="510" y="304" width="148" height="56" rx="4" stroke-width="0.5"/>
  <text class="th" x="584" y="323" text-anchor="middle" dominant-baseline="central">ARIA initialisation</text>
  <text class="ts" x="584" y="341" text-anchor="middle" dominant-baseline="central">tier_state created</text>
  <text class="ts" x="584" y="355" text-anchor="middle" dominant-baseline="central">Insight Narrator scheduled</text>
</g>

<!-- Role selection -->
<line x1="584" y1="360" x2="584" y2="400" class="arr" marker-end="url(#arrow)" stroke="#ba7517"/>
<g class="node c-purple">
  <rect x="510" y="400" width="148" height="56" rx="4" stroke-width="0.5"/>
  <text class="th" x="584" y="419" text-anchor="middle" dominant-baseline="central">Role selection</text>
  <text class="ts" x="584" y="437" text-anchor="middle" dominant-baseline="central">Seeker · Answerer · Both</text>
  <text class="ts" x="584" y="451" text-anchor="middle" dominant-baseline="central">Institution account</text>
</g>

<!-- Expertise tagging -->
<line x1="584" y1="456" x2="584" y2="496" class="arr" marker-end="url(#arrow)" stroke="#7f77dd"/>
<g class="node c-purple">
  <rect x="510" y="496" width="148" height="56" rx="4" stroke-width="0.5"/>
  <text class="th" x="584" y="515" text-anchor="middle" dominant-baseline="central">Expertise tagging</text>
  <text class="ts" x="584" y="533" text-anchor="middle" dominant-baseline="central">tags[] → Smart Matcher</text>
  <text class="ts" x="584" y="547" text-anchor="middle" dominant-baseline="central">index · min 1 required</text>
</g>

<!-- Active profile -->
<line x1="584" y1="552" x2="584" y2="592" class="arr" marker-end="url(#arrow)" stroke="#7f77dd"/>
<g class="node c-teal">
  <rect x="510" y="592" width="148" height="36" rx="4" stroke-width="0.5"/>
  <text class="th" x="584" y="610" text-anchor="middle" dominant-baseline="central">Profile active → feed</text>
</g>

</svg>
</div>

<div class="footer">© 2025 Engageneering™ · Engageneer™ · Section 41 Trademark · engageneering.org · Registration flow v1</div>
</body>
</html>
